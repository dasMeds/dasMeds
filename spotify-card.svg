<svg xmlns="http://www.w3.org/2000/svg" width="900" height="800" viewBox="0 0 900 800">
  <defs>
    <clipPath id="cc">
      <rect x="4" y="4" width="892" height="792" rx="16"/>
    </clipPath>
    
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    
    <filter id="art-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4868a"/>
      <stop offset="100%" stop-color="#9a4e52"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8c8a5a"/>
      <stop offset="100%" stop-color="#606040"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1e28"/>
      <stop offset="100%" stop-color="#4a2845"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4888a"/>
      <stop offset="100%" stop-color="#a06868"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8A48F"/>
      <stop offset="100%" stop-color="#BB8588"/>
    </linearGradient>
  </defs>

  <!-- card with sweet drop shadow -->
  <rect x="4" y="4" width="892" height="792" rx="16" fill="#1a1710" filter="url(#shadow)"/>

  <!-- ── HEADER ── -->
  <text x="36" y="51" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="800" fill="#EFEBCE" letter-spacing="3">ON REPEAT</text>

  <!-- ── CREAM BODY ── -->
  <rect x="4" y="80" width="892" height="712" fill="#EFEBCE" clip-path="url(#cc)"/>

  <!-- ══ ROW 1: Konsensya ══ -->
  <text x="46" y="150" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" fill="#999" text-anchor="middle">1</text>
  <g transform="translate(72,128)">
    <rect width="44" height="44" rx="6" fill="url(#g1)" filter="url(#art-shadow)"/>
    <text x="22" y="22" font-family="Georgia,'Times New Roman',serif" font-size="20" fill="#000000" text-anchor="middle" dominant-baseline="central">♠</text>
  </g>
  <text x="146" y="142" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="700" fill="#1a1710">Konsensya</text>
  <text x="146" y="166" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#777">IV OF SPADES</text>
  <line x1="28" y1="220" x2="876" y2="220" stroke="#00000012" stroke-width="1"/>

  <!-- ══ ROW 2: Tamis ng Pagkakamali ══ -->
  <text x="46" y="290" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" fill="#999" text-anchor="middle">2</text>
  <g transform="translate(72,268)">
    <rect width="44" height="44" rx="6" fill="url(#g2)" filter="url(#art-shadow)"/>
    <text x="22" y="22" font-family="Georgia,'Times New Roman',serif" font-size="20" fill="#000000" text-anchor="middle" dominant-baseline="central">♠</text>
  </g>
  <text x="146" y="282" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="700" fill="#1a1710">Tamis ng Pagkakamali</text>
  <text x="146" y="306" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#777">IV OF SPADES</text>
  <line x1="28" y1="360" x2="876" y2="360" stroke="#00000012" stroke-width="1"/>

  <!-- ══ ROW 3: Sweet Child O' Mine ══ -->
  <text x="46" y="430" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" fill="#999" text-anchor="middle">3</text>
  <g transform="translate(72,408)">
    <rect width="44" height="44" rx="6" fill="url(#g3)" filter="url(#art-shadow)"/>
    <text x="22" y="22" font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif" font-size="18" text-anchor="middle" dominant-baseline="central">🎸</text>
  </g>
  <text x="146" y="422" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="700" fill="#1a1710">Sweet Child O’ Mine</text>
  <text x="146" y="446" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#777">Guns N’ Roses</text>
  <line x1="28" y1="500" x2="876" y2="500" stroke="#00000012" stroke-width="1"/>

  <!-- ══ ROW 4: A Thousand Years ══ -->
  <text x="46" y="570" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" fill="#999" text-anchor="middle">4</text>
  <g transform="translate(72,548)">
    <rect width="44" height="44" rx="6" fill="url(#g4)" filter="url(#art-shadow)"/>
    <text x="22" y="22" font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif" font-size="18" fill="#1a1710" text-anchor="middle" dominant-baseline="central" opacity="0.65">🎵</text>
  </g>
  <text x="146" y="562" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="700" fill="#1a1710">A Thousand Years</text>
  <text x="146" y="586" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#777">John Michael Howell, JVKE, ZVC</text>
  <line x1="28" y1="640" x2="876" y2="640" stroke="#00000012" stroke-width="1"/>

  <!-- ══ ROW 5: Anytime Anywhere ══ -->
  <text x="46" y="710" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" fill="#999" text-anchor="middle">5</text>
  <g transform="translate(72,688)">
    <rect width="44" height="44" rx="6" fill="url(#g5)" filter="url(#art-shadow)"/>
    <text x="22" y="22" font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif" font-size="18" text-anchor="middle" dominant-baseline="central">🎧</text>
  </g>
  <text x="146" y="702" font-family="'Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="700" fill="#1a1710">Anytime Anywhere</text>
  <text x="146" y="726" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#777">milet</text>

</svg>
